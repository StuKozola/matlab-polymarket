name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      run-integration:
        description: Run live integration tests when repository secrets are configured
        required: false
        default: "false"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: matlab-actions/setup-matlab@v2
        with:
          release: R2024b
      - uses: matlab-actions/run-build@v2
        with:
          tasks: test check package
      - uses: actions/upload-artifact@v4
        with:
          name: Polymarket.mltbx
          path: release/Polymarket.mltbx

  integration:
    if: github.event_name == 'workflow_dispatch' && inputs.run-integration == 'true'
    runs-on: ubuntu-latest
    env:
      POLYMARKET_RUN_INTEGRATION: true
      POLYMARKET_RUN_WEBSOCKET_TESTS: ${{ secrets.POLYMARKET_RUN_WEBSOCKET_TESTS }}
      POLYMARKET_EXAMPLE_TOKEN_ID: ${{ secrets.POLYMARKET_EXAMPLE_TOKEN_ID }}
      POLY_ADDRESS: ${{ secrets.POLY_ADDRESS }}
      POLY_API_KEY: ${{ secrets.POLY_API_KEY }}
      POLY_SECRET: ${{ secrets.POLY_SECRET }}
      POLY_PASSPHRASE: ${{ secrets.POLY_PASSPHRASE }}
      POLY_SIGNATURE_TYPE: ${{ secrets.POLY_SIGNATURE_TYPE }}
      POLY_FUNDER: ${{ secrets.POLY_FUNDER }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: matlab-actions/setup-matlab@v2
        with:
          release: R2024b
      - uses: matlab-actions/run-build@v2
        with:
          tasks: java integration

